<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Audio Čtečka</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Čtečka">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --accent:      #6366f1;
            --accent-dark: #4f46e5;
            --accent-glow: rgba(99, 102, 241, 0.35);
            --bg:          #0f0f1a;
            --surface:     #16182a;
            --surface2:    #1e2035;
            --border:      rgba(99, 102, 241, 0.2);
            --text:        #e2e8f0;
            --text-muted:  #94a3b8;
            --red:         #ef4444;
            --red-dark:    #b91c1c;
            --green:       #22c55e;
            --radius:      16px;
            --radius-sm:   10px;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg:       #f1f5f9;
                --surface:  #ffffff;
                --surface2: #f8fafc;
                --border:   rgba(99, 102, 241, 0.15);
                --text:     #1e293b;
                --text-muted: #64748b;
            }
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
            padding-top: max(env(safe-area-inset-top, 0px), 0px);
        }

        /* ---------- Header ---------- */
        header {
            width: 100%;
            padding: 18px 24px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .logo {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .logo svg { width: 22px; height: 22px; color: white; }

        header h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        header p {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 1px;
        }

        /* ---------- Main ---------- */
        main {
            flex: 1;
            width: 100%;
            max-width: 640px;
            padding: 20px 16px 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ---------- Card ---------- */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.15);
        }

        .card-label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        /* ---------- Textarea ---------- */
        .textarea-wrap { position: relative; }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 14px;
            background: var(--surface2);
            color: var(--text);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            line-height: 1.65;
            resize: vertical;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        textarea::placeholder { color: var(--text-muted); }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .char-count {
            display: block;
            text-align: right;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* ---------- Controls ---------- */
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .control-group {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px;
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .control-group label span {
            font-weight: 700;
            color: var(--accent);
            font-size: 0.85rem;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 8px var(--accent-glow);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 14px var(--accent-glow);
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border: none;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        /* ---------- Waveform ---------- */
        .waveform {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 48px;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .waveform.active { opacity: 1; }

        .waveform .bar {
            width: 4px;
            border-radius: 2px;
            background: linear-gradient(to top, var(--accent-dark), var(--accent));
            animation: wave 1s ease-in-out infinite;
        }

        .waveform .bar:nth-child(1)  { animation-delay: 0s;    --h: 16px; }
        .waveform .bar:nth-child(2)  { animation-delay: 0.1s;  --h: 30px; }
        .waveform .bar:nth-child(3)  { animation-delay: 0.2s;  --h: 42px; }
        .waveform .bar:nth-child(4)  { animation-delay: 0.05s; --h: 28px; }
        .waveform .bar:nth-child(5)  { animation-delay: 0.15s; --h: 38px; }
        .waveform .bar:nth-child(6)  { animation-delay: 0.25s; --h: 20px; }
        .waveform .bar:nth-child(7)  { animation-delay: 0.1s;  --h: 34px; }
        .waveform .bar:nth-child(8)  { animation-delay: 0.2s;  --h: 46px; }
        .waveform .bar:nth-child(9)  { animation-delay: 0.05s; --h: 24px; }
        .waveform .bar:nth-child(10) { animation-delay: 0.15s; --h: 40px; }
        .waveform .bar:nth-child(11) { animation-delay: 0.0s;  --h: 28px; }
        .waveform .bar:nth-child(12) { animation-delay: 0.25s; --h: 16px; }

        @keyframes wave {
            0%, 100% { height: 6px; }
            50%       { height: var(--h, 20px); }
        }

        /* ---------- Status ---------- */
        .status {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            min-height: 20px;
            transition: color 0.3s;
        }

        .status.playing { color: var(--accent); }
        .status.stopped { color: var(--text-muted); }

        /* ---------- Buttons ---------- */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
        }

        button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s, background-color 0.2s;
            padding: 14px 20px;
            user-select: none;
            -webkit-user-select: none;
        }

        button:active { transform: scale(0.97); }

        .btn-play {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-play:hover { box-shadow: 0 6px 28px var(--accent-glow); }

        .btn-play.playing {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
        }

        .btn-stop {
            background: var(--surface2);
            color: var(--red);
            border: 1.5px solid rgba(239, 68, 68, 0.25);
            padding: 14px 16px;
        }

        .btn-stop:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--red);
        }

        button svg { width: 18px; height: 18px; flex-shrink: 0; }

        /* ---------- Update banner ---------- */
        #update-banner {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: linear-gradient(135deg, rgba(34,197,94,0.12), rgba(16,185,129,0.08));
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: var(--radius);
            font-size: 0.85rem;
            color: var(--text);
        }

        #update-banner.show { display: flex; }
        #update-banner .update-icon { font-size: 1.4rem; flex-shrink: 0; }
        #update-banner p { flex: 1; line-height: 1.4; }
        #update-banner p strong { color: #22c55e; }

        .btn-update {
            background: #22c55e;
            color: white;
            font-size: 0.8rem;
            padding: 8px 14px;
            border-radius: 8px;
            white-space: nowrap;
        }

        .btn-update:hover { background: #16a34a; }

        /* ---------- Install banner ---------- */
        #install-banner {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(79,70,229,0.1));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.85rem;
            color: var(--text);
        }

        #install-banner.show { display: flex; }

        #install-banner .install-icon {
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        #install-banner p { flex: 1; line-height: 1.4; }
        #install-banner p strong { color: var(--accent); }

        .btn-install {
            background: var(--accent);
            color: white;
            font-size: 0.8rem;
            padding: 8px 14px;
            border-radius: 8px;
            white-space: nowrap;
        }

        .btn-install:hover { background: var(--accent-dark); }

        #install-banner .close-banner {
            background: none;
            color: var(--text-muted);
            padding: 4px;
            border-radius: 4px;
            font-size: 1rem;
            min-width: 0;
        }

        /* ---------- Toast ---------- */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 18px;
            border-radius: 50px;
            font-size: 0.83rem;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ---------- Clear btn ---------- */
        .btn-clear {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            padding: 0;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-clear:hover { color: var(--text); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        /* ---------- Language picker ---------- */
        .lang-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .lang-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 13px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            background: var(--surface2);
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, background 0.15s, box-shadow 0.15s;
            font-family: inherit;
            user-select: none;
            -webkit-user-select: none;
        }

        .lang-chip:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .lang-chip.active {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.15);
            color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent);
        }

        .lang-flag { font-size: 1.1em; line-height: 1; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
                <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/>
                <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
            </svg>
        </div>
        <div>
            <h1>Audio Čtečka</h1>
            <p id="header-lang">Text-to-speech &middot; Čeština</p>
        </div>
    </header>

    <main>

        <!-- Update banner -->
        <div id="update-banner">
            <div class="update-icon">🔄</div>
            <p><strong>Nová verze je k dispozici</strong><br>Aktualizujte pro nejnovější funkce</p>
            <button class="btn-update" id="update-btn">Aktualizovat</button>
        </div>

        <!-- Install banner -->
        <div id="install-banner">
            <div class="install-icon">📲</div>
            <p><strong>Nainstalovat aplikaci</strong><br>Přidejte na plochu pro rychlý přístup a sdílení</p>
            <button class="btn-install" id="install-btn">Instalovat</button>
            <button class="close-banner" id="close-banner" aria-label="Zavřít">✕</button>
        </div>

        <!-- Text card -->
        <div class="card">
            <div class="card-header">
                <div class="card-label">Text ke čtení</div>
                <button class="btn-clear" id="clearBtn">Vymazat</button>
            </div>
            <div class="textarea-wrap">
                <textarea id="textToRead" placeholder="Vložte nebo nasdílejte text, který má být přečten…" spellcheck="false"></textarea>
            </div>
            <span class="char-count" id="charCount">0 znaků</span>
        </div>

        <!-- Settings card -->
        <div class="card">
            <div class="card-label">Nastavení přehrávání</div>
            <div class="controls-grid">
                <div class="control-group">
                    <label>Rychlost <span id="rateValue">1.0×</span></label>
                    <input type="range" id="rate" min="0.5" max="2" value="1" step="0.1">
                </div>
                <div class="control-group">
                    <label>Výška hlasu <span id="pitchValue">1.0</span></label>
                    <input type="range" id="pitch" min="0.5" max="2" value="1" step="0.1">
                </div>
            </div>
        </div>

        <!-- Language card -->
        <div class="card">
            <div class="card-label">Jazyk předčítání</div>
            <div class="lang-grid" id="langGrid">
                <button class="lang-chip" data-lang="cs-CZ" data-label="Čeština"><span class="lang-flag">🇨🇿</span> Čeština</button>
                <button class="lang-chip" data-lang="sk-SK" data-label="Slovenčina"><span class="lang-flag">🇸🇰</span> Slovenčina</button>
                <button class="lang-chip" data-lang="en-GB" data-label="English (UK)"><span class="lang-flag">🇬🇧</span> English</button>
                <button class="lang-chip" data-lang="en-US" data-label="English (US)"><span class="lang-flag">🇺🇸</span> English US</button>
                <button class="lang-chip" data-lang="de-DE" data-label="Deutsch"><span class="lang-flag">🇩🇪</span> Deutsch</button>
                <button class="lang-chip" data-lang="fr-FR" data-label="Français"><span class="lang-flag">🇫🇷</span> Français</button>
                <button class="lang-chip" data-lang="es-ES" data-label="Español"><span class="lang-flag">🇪🇸</span> Español</button>
                <button class="lang-chip" data-lang="it-IT" data-label="Italiano"><span class="lang-flag">🇮🇹</span> Italiano</button>
                <button class="lang-chip" data-lang="pl-PL" data-label="Polski"><span class="lang-flag">🇵🇱</span> Polski</button>
                <button class="lang-chip" data-lang="uk-UA" data-label="Українська"><span class="lang-flag">🇺🇦</span> Українська</button>
                <button class="lang-chip" data-lang="ru-RU" data-label="Русский"><span class="lang-flag">🇷🇺</span> Русский</button>
                <button class="lang-chip" data-lang="zh-CN" data-label="中文"><span class="lang-flag">🇨🇳</span> 中文</button>
            </div>
        </div>

        <!-- Player card -->
        <div class="card">
            <div class="waveform" id="waveform">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
            <p class="status" id="status">Připraveno ke čtení</p>
            <br>
            <div class="btn-group">
                <button class="btn-play" id="playBtn">
                    <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                    <span id="playLabel">Přehrát</span>
                </button>
                <button class="btn-stop" id="stopBtn" title="Zastavit">
                    <svg viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
                </button>
            </div>
        </div>

    </main>

    <div class="toast" id="toast"></div>

    <script>
        // ── Service Worker + auto-update ───────────────────────────
        if ('serviceWorker' in navigator) {
            const updateBanner = document.getElementById('update-banner');
            const updateBtn    = document.getElementById('update-btn');
            let waitingSW = null;

            function showUpdateBanner(sw) {
                waitingSW = sw;
                updateBanner.classList.add('show');
            }

            navigator.serviceWorker.register('sw.js').then((reg) => {
                // Nový SW právě stahuje/čeká
                reg.addEventListener('updatefound', () => {
                    const newSW = reg.installing;
                    newSW.addEventListener('statechange', () => {
                        if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                            showUpdateBanner(newSW);
                        }
                    });
                });

                // SW už čeká z předchozího načtení
                if (reg.waiting && navigator.serviceWorker.controller) {
                    showUpdateBanner(reg.waiting);
                }

                // Periodicky kontroluj novou verzi (každých 60 s)
                setInterval(() => reg.update(), 60_000);
            }).catch(err => console.error('SW error:', err));

            // Po aktivaci nového SW stránku znovu načti
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                window.location.reload();
            });

            updateBtn.addEventListener('click', () => {
                if (waitingSW) waitingSW.postMessage('SKIP_WAITING');
            });
        }

        // ── Sdílený text z URL ──────────────────────────────────────
        const params = new URLSearchParams(window.location.search);
        const sharedText = params.get('text') || params.get('title') || '';
        const textArea = document.getElementById('textToRead');

        if (sharedText) {
            textArea.value = sharedText;
            window.history.replaceState({}, document.title, window.location.pathname);
            showToast('Text byl nasdílen ✓');
        }

        // ── Char count ──────────────────────────────────────────────
        const charCount = document.getElementById('charCount');

        function updateCharCount() {
            const n = textArea.value.length;
            charCount.textContent = n === 0 ? '0 znaků' : `${n.toLocaleString('cs')} znaků`;
        }

        textArea.addEventListener('input', updateCharCount);
        updateCharCount();

        document.getElementById('clearBtn').addEventListener('click', () => {
            textArea.value = '';
            updateCharCount();
            textArea.focus();
        });

        // ── Sliders ─────────────────────────────────────────────────
        const rateInput  = document.getElementById('rate');
        const pitchInput = document.getElementById('pitch');
        const rateValue  = document.getElementById('rateValue');
        const pitchValue = document.getElementById('pitchValue');

        rateInput.addEventListener('input', () => {
            rateValue.textContent = parseFloat(rateInput.value).toFixed(1) + '×';
        });

        pitchInput.addEventListener('input', () => {
            pitchValue.textContent = parseFloat(pitchInput.value).toFixed(1);
        });

        // ── Language picker ─────────────────────────────────────────
        const LANG_KEY = 'ctecka-lang';
        let selectedLang = localStorage.getItem(LANG_KEY) || 'cs-CZ';

        const langChips = document.querySelectorAll('.lang-chip');

        const headerLang = document.getElementById('header-lang');

        function activateLang(lang) {
            selectedLang = lang;
            localStorage.setItem(LANG_KEY, lang);
            langChips.forEach(chip => {
                chip.classList.toggle('active', chip.dataset.lang === lang);
            });
            const active = document.querySelector(`.lang-chip[data-lang="${lang}"]`);
            if (active && headerLang) {
                headerLang.textContent = `Text-to-speech · ${active.dataset.label}`;
            }
        }

        langChips.forEach(chip => {
            chip.addEventListener('click', () => {
                if (synth.speaking) { synth.cancel(); setPlaying(false); }
                activateLang(chip.dataset.lang);
            });
        });

        activateLang(selectedLang);

        // ── Speech ──────────────────────────────────────────────────
        const synth     = window.speechSynthesis;
        const playBtn   = document.getElementById('playBtn');
        const playIcon  = document.getElementById('playIcon');
        const playLabel = document.getElementById('playLabel');
        const stopBtn   = document.getElementById('stopBtn');
        const waveform  = document.getElementById('waveform');
        const statusEl  = document.getElementById('status');

        let isPlaying = false;

        function setPlaying(state) {
            isPlaying = state;
            waveform.classList.toggle('active', state);
            playBtn.classList.toggle('playing', state);

            if (state) {
                playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';
                playLabel.textContent = 'Pozastavit';
                statusEl.textContent  = 'Probíhá čtení…';
                statusEl.className    = 'status playing';
            } else {
                playIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
                playLabel.textContent = 'Přehrát';
                statusEl.textContent  = 'Připraveno ke čtení';
                statusEl.className    = 'status stopped';
            }
        }

        playBtn.addEventListener('click', () => {
            const text = textArea.value.trim();
            if (!text) {
                showToast('Nejprve vložte nějaký text');
                textArea.focus();
                return;
            }

            if (synth.speaking && !synth.paused) {
                synth.pause();
                setPlaying(false);
                statusEl.textContent = 'Pozastaveno';
                return;
            }

            if (synth.paused) {
                synth.resume();
                setPlaying(true);
                return;
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang  = selectedLang;
            utterance.rate  = parseFloat(rateInput.value);
            utterance.pitch = parseFloat(pitchInput.value);

            utterance.onstart = () => setPlaying(true);
            utterance.onend   = () => setPlaying(false);
            utterance.onerror = () => setPlaying(false);

            // Chrome: cancel() + okamžité speak() tiše selže — nutný setTimeout
            synth.cancel();
            setTimeout(() => synth.speak(utterance), 50);
        });

        stopBtn.addEventListener('click', () => {
            synth.cancel();
            setPlaying(false);
        });

        // ── Install prompt ──────────────────────────────────────────
        let deferredPrompt = null;
        const installBanner = document.getElementById('install-banner');
        const installBtn    = document.getElementById('install-btn');
        const closeBanner   = document.getElementById('close-banner');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.classList.add('show');
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            installBanner.classList.remove('show');
            if (outcome === 'accepted') showToast('Aplikace nainstalována ✓');
        });

        closeBanner.addEventListener('click', () => {
            installBanner.classList.remove('show');
        });

        window.addEventListener('appinstalled', () => {
            installBanner.classList.remove('show');
            deferredPrompt = null;
        });

        // ── Toast ───────────────────────────────────────────────────
        let toastTimer = null;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
        }
    </script>
</body>
</html>
